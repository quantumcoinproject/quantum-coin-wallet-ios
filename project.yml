# XcodeGen spec for the iOS clone of the Quantum Coin Wallet.
#
# Build:
#   brew install xcodegen
#   cd ios
#   xcodegen generate
#   open QuantumCoinWallet.xcodeproj
#
# The generated .xcodeproj is intentionally not committed - regenerate from
# this spec on macOS so the project is always in sync with the source tree.

name: QuantumCoinWallet
options:
  bundleIdPrefix: org.quantumcoin
  deploymentTarget:
    iOS: "15.0"
  minimumXcodeGenVersion: "2.38.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    PRODUCT_NAME: $(TARGET_NAME)
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad
    ENABLE_BITCODE: NO
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    SUPPORTS_MACCATALYST: NO

targets:
  QuantumCoinWallet:
    type: application
    platform: iOS
    sources:
      - path: QuantumCoinWallet
        excludes:
          - "**/*.md"
    resources:
      - path: QuantumCoinWallet/Resources
        buildPhase: resources
      - path: QuantumCoinWallet/Assets.xcassets
        buildPhase: resources
      - path: QuantumCoinWallet/LaunchScreen.storyboard
        buildPhase: resources
    info:
      path: QuantumCoinWallet/Info.plist
      properties:
        CFBundleDisplayName: "Quantum Wallet"
        CFBundleName: "QuantumCoinWallet"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: "LaunchScreen"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes: []
        NSCameraUsageDescription: >-
          Camera access is used to scan QR codes when entering a recipient
          wallet address.
        NSPhotoLibraryUsageDescription: >-
          Photo Library access is used to scan QR codes from saved images.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Quantum Coin Wallet"
            LSHandlerRank: "Owner"
            LSItemContentTypes: ["org.quantumcoin.wallet"]
            CFBundleTypeRole: "Viewer"
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: "org.quantumcoin.wallet"
            UTTypeDescription: "Quantum Coin Wallet backup"
            UTTypeConformsTo: ["public.data"]
            UTTypeTagSpecification:
              "public.filename-extension": ["wallet"]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.quantumcoin.wallet
        INFOPLIST_FILE: QuantumCoinWallet/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuantumCoinWallet/QuantumCoinWallet.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic

  QuantumCoinWalletTests:
    type: bundle.unit-test
    platform: iOS
    sources: [QuantumCoinWalletTests]
    dependencies:
      - target: QuantumCoinWallet
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/QuantumCoinWallet.app/QuantumCoinWallet"

schemes:
  QuantumCoinWallet:
    build:
      targets:
        QuantumCoinWallet: all
        QuantumCoinWalletTests: [test]
    test:
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug 1": true
      gatherCoverageData: true
      targets:
        - QuantumCoinWalletTests
